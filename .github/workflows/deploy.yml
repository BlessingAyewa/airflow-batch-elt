name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/airflow/airflow
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install uv && uv export --no-hashes > /tmp/requirements.txt && pip install -r /tmp/requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  build-and-deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install GKE auth plugin
        run: gcloud components install gke-gcloud-auth-plugin

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker image
        run: docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .

      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Get GKE credentials
        run: gcloud container clusters get-credentials $GKE_CLUSTER --zone $GKE_ZONE --project $PROJECT_ID

      - name: Create namespace and apply manifests
        run: |
          kubectl create namespace airflow --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/manifests/service-account.yaml
          kubectl apply -f k8s/manifests/postgres.yaml
          kubectl rollout status statefulset/airflow-postgresql -n airflow --timeout=5m

      - name: Run database migrations
        run: |
          kubectl delete pod -n airflow db-migrate --ignore-not-found=true
          kubectl run -n airflow db-migrate \
            --image=apache/airflow:2.9.1-python3.11 \
            --restart=Never \
            --env="AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgresql:5432/airflow" \
            -- airflow db migrate
          for i in $(seq 1 30); do
            STATUS=$(kubectl get pod db-migrate -n airflow -o jsonpath='{.status.phase}' 2>/dev/null)
            echo "Migration pod status: $STATUS"
            if [ "$STATUS" = "Succeeded" ]; then echo "Migrations complete."; break; fi
            if [ "$STATUS" = "Failed" ]; then kubectl logs -n airflow db-migrate; exit 1; fi
            if [ "$i" = "30" ]; then echo "Migration timed out after 5 minutes"; kubectl logs -n airflow db-migrate; exit 1; fi
            sleep 10
          done

      - name: Reset Helm-managed secrets
        run: |
          kubectl delete secret -n airflow airflow-fernet-key --ignore-not-found=true
          kubectl delete secret -n airflow airflow-secret-key --ignore-not-found=true

      - name: Deploy to GKE with Helm
        run: |
          helm repo add apache-airflow https://airflow.apache.org
          helm repo update
          helm upgrade --install airflow apache-airflow/airflow \
            --namespace airflow \
            --version "1.15.0" \
            --values k8s/helm/values.yaml \
            --set image.tag=${{ github.sha }}

      - name: Verify deployment
        run: |
          echo "--- Pod status ---"
          kubectl get pods -n airflow
          echo "--- Waiting for statsd ---"
          kubectl rollout status deployment/airflow-statsd -n airflow --timeout=3m
          echo "--- Waiting for webserver ---"
          kubectl rollout status deployment/airflow-webserver -n airflow --timeout=10m || {
            echo "Webserver failed. Logs:";
            kubectl logs -n airflow -l component=webserver --tail=50;
            kubectl describe pod -n airflow -l component=webserver | tail -30;
            exit 1;
          }
          echo "--- Waiting for scheduler ---"
          kubectl rollout status deployment/airflow-scheduler -n airflow --timeout=10m || {
            echo "Scheduler failed. Logs:";
            kubectl logs -n airflow -l component=scheduler --tail=50;
            exit 1;
          }
          echo "--- Waiting for triggerer ---"
          kubectl rollout status statefulset/airflow-triggerer -n airflow --timeout=5m || {
            echo "Triggerer failed. Logs:";
            kubectl logs -n airflow -l component=triggerer --tail=50;
            exit 1;
          }
          echo "--- All components healthy ---"
          kubectl get pods -n airflow