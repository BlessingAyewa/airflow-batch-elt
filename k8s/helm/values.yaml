# k8s/helm/values.yaml

executor: KubernetesExecutor

# Pin init containers to the same Airflow version our custom image is built on.
defaultAirflowRepository: apache/airflow
defaultAirflowTag: "2.9.1-python3.11"

images:
  airflow:
    repository: us-central1-docker.pkg.dev/blessing-airflow-elt/airflow/airflow
    tag: latest
    pullPolicy: Always

# Helm manages these K8s secrets and injects them automatically.
fernetKey: "fernet-key"
webserverSecretKey: "secret-key"

# Force all components to use the 'airflow' K8s service account
# which has the Workload Identity annotation for GCP access.
serviceAccount:
  create: false
  name: airflow

scheduler:
  serviceAccount:
    create: false
    name: airflow

webserver:
  serviceAccount:
    create: false
    name: airflow
  service:
    type: LoadBalancer

triggerer:
  serviceAccount:
    create: false
    name: airflow

workers:
  serviceAccount:
    create: false
    name: airflow

env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "False"
  - name: AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION
    value: "True"
  - name: GCP_PROJECT_ID
    value: "blessing-airflow-elt"
  - name: GCS_BUCKET
    value: "blessing-airflow-elt-airflow-data"
  - name: AIRFLOW_VAR_GCP_PROJECT_ID
    value: "blessing-airflow-elt"
  - name: AIRFLOW_VAR_GCS_BUCKET
    value: "blessing-airflow-elt-airflow-data"
  - name: AIRFLOW_VAR_GCS_PREFIX
    value: "raw/orders"
  - name: AIRFLOW_VAR_GCS_FILENAME
    value: "orders.csv"
  - name: AIRFLOW_VAR_BQ_DATASET
    value: "raw"
  - name: AIRFLOW_VAR_BQ_TABLE
    value: "orders"

logs:
  persistence:
    enabled: false

config:
  logging:
    remote_logging: "True"
    remote_base_log_folder: "gs://blessing-airflow-elt-airflow-data/airflow-logs"
    remote_log_conn_id: "google_cloud_default"

# Use our external postgres StatefulSet instead of the bundled Bitnami chart.
postgresql:
  enabled: false

data:
  metadataConnection:
    user: airflow
    pass: airflow
    host: airflow-postgresql
    port: 5432
    db: airflow
    sslmode: disable

redis:
  enabled: false

# Migrations are run explicitly in CI before Helm deploys.
migrateDatabaseJob:
  enabled: false

# Create the default admin user as a regular Job, not a Helm hook.
createUserJob:
  useHelmHooks: false
  applyCustomEnv: false