version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: raw
    tables:
      - name: orders
        description: Raw orders loaded from GCS by Airflow

models:
  - name: stg_orders
    description: Cleaned and standardized orders from the raw source
    columns:
      - name: order_id
        description: Unique order identifier
        tests:
          - not_null
          - unique
      - name: customer_id
        description: Customer who placed the order
        tests:
          - not_null
      - name: order_amount
        description: Order value — cast to numeric from raw string
        tests:
          - not_null
      - name: order_date
        description: Date the order was placed
        tests:
          - not_null
      - name: order_status
        description: Current status — lowercased and trimmed
        tests:
          - not_null
          - accepted_values:
              values: [pending, complete, cancelled]
      - name: created_at
        description: Timestamp the order record was created
        tests:
          - not_null